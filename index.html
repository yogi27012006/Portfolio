<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yogeswari A | Home</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Reset & Font ===== */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
html { scroll-behavior: smooth; }

/* ===== Body & Gradient Background ===== */
body {
    background: linear-gradient(135deg, #0a0f1f, #111a2e, #1b2a49);
    color:#ffffff;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}
body::before {
    content:"";
    position: fixed;
    inset:0;
    background: radial-gradient(circle at 25% 30%, rgba(0,255,200,0.25), transparent 40%),
                radial-gradient(circle at 75% 70%, rgba(0,150,255,0.25), transparent 40%);
    z-index:-1;
    filter: blur(120px);
}

/* ===== Navbar ===== */
nav {
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    background: linear-gradient(90deg, #0f0f1a, #1c1c2b, #141421);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 20px 60px;
    gap: 25px;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 1000;
}
nav h2 {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    font-size: 18px;
    font-weight: 600;
}
nav a {
    text-decoration: none;
    color: #ffffff;
    font-weight: 500;
    transition: 0.3s;
    padding: 8px 14px;
    border-radius: 20px;
}
nav a:hover { background: linear-gradient(90deg,#ffffff,#e0e0ff); color:#000; transform: scale(1.08); }
nav a.active {
    background: linear-gradient(90deg,#00f5d4,#9b5de5);
    color: #000;
    padding: 8px 15px;
    border-radius: 20px;
    font-weight: 600;
    box-shadow: 0 0 15px rgba(0,245,212,0.7);
}

/* ===== Content Centering ===== */
.content {
    display: flex;
    flex-direction: column;
    justify-content: center; /* vertical center */
    align-items: center;     /* horizontal center */
    min-height: 100vh;
    text-align: center;
    padding: 20px;
    gap: 20px;
}

/* ===== Header ===== */
header h1 { font-size: 42px; color: #ffffff; }
header p { margin-top: 10px; color: #d1d1d1; font-size: 18px; }

/* ===== Links below header ===== */
.header-links a {
    display: inline-block;
    margin: 5px 10px;
    color: #00f5d4;
    font-weight: 500;
    text-decoration: none;
    transition: 0.3s;
}
.header-links a:hover {
    color: white;
    transform: scale(1.05);
}

/* ===== Footer ===== */
footer { text-align: center; padding: 20px; color: #ffffffcc; }

@media (max-width: 768px){
    nav { flex-wrap: wrap; justify-content: center; padding:15px 20px; gap:15px; }
}
</style>
</head>
<body>

<!-- ===== Navbar ===== -->
<nav>
   
    <a href="index.html" >Home</a>
    <a href="about.html">About</a>
    <a href="resume.html">Resume</a>
    <a href="projects.html">My Projects</a>
    <a href="skills.html">Skills</a>
    <a href="certification.html">Certification</a>
    <a href="experience.html">experience</a>
    <a href="contact.html">contact</a>
</nav>

<!-- ===== Content ===== -->
<div class="content">
    <header>
        <h1 style="font-size: 80px;">Yogeswari A</h1>
        <p style="color: #00f5d4;">Computer Science Student | Aspiring Software Engineer</p>
    </header>

    <!-- ===== Email & LinkedIn below header ===== -->
    <div class="header-links">
        <a href="mailto:ayogeswari2006@gmail.com">ayogeswari2006@gmail.com</a>
        <a href="https://linkedin.com/in/a-yogeswari-99626636a" target="_blank">linkedin.com/in/a-yogeswari-99626636a</a>
    </div>
</div>


<script>
// Highlight active menu link automatically
const navLinks = document.querySelectorAll("nav a");
navLinks.forEach(link => { if(link.href === window.location.href){ link.classList.add("active"); } });
</script>

</body>
</html>
