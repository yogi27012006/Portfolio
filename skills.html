<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yogeswari A | Skills</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
html, body { height: 100%; scroll-behavior: smooth; }

/* ===== Body & Gradient Background ===== */
body {
    background: linear-gradient(135deg, #0a0f1f, #111a2e, #1b2a49);
    color:#ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
}
body::before {
    content:"";
    position: fixed;
    inset:0;
    background: radial-gradient(circle at 25% 30%, rgba(0,255,200,0.25), transparent 40%),
                radial-gradient(circle at 75% 70%, rgba(0,150,255,0.25), transparent 40%);
    z-index:-1;
    filter: blur(120px);
}

/* ===== Navbar ===== */
nav {
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    background: linear-gradient(90deg, #0f0f1a, #1c1c2b, #141421);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 20px 60px;
    gap: 25px;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 1000;
}
nav h2 { position: absolute; left: 50%; transform: translateX(-50%); color: #ffffff; font-size: 18px; font-weight: 600; }
nav a { text-decoration: none; color: #ffffff; font-weight: 500; transition: 0.3s; padding: 8px 14px; border-radius: 20px; }
nav a:hover { background: linear-gradient(90deg,#ffffff,#e0e0ff); color:#000; transform: scale(1.08); }
nav a.active { background: linear-gradient(90deg,#00f5d4,#9b5de5); color:#000; padding: 8px 15px; border-radius: 20px; font-weight:600; box-shadow:0 0 15px rgba(0,245,212,0.7); }

/* ===== Content ===== */
.content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    max-width: 900px;
    padding: 0 20px;
}

/* ===== Header ===== */
header h1 { font-size: 60px; color: #ffffff; margin-bottom: 15px; }
header p { color: #d1d1d1; font-size: 22px; line-height: 1.6; }

/* ===== Skills Cards ===== */
.skills-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}
.skill {
    background: rgba(255,255,255,0.08);
    padding: 20px 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    max-width: 200px;
    width: 100%;
    text-align: center;
    font-size: 20px;
    color: #ffffff;
    border: 1px solid rgba(255,255,255,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
}
.skill:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(88,166,255,0.6);
}

/* ===== Footer ===== */
footer { text-align: center; padding: 20px; color: #ffffffcc; margin-top: 40px; }

@media (max-width:768px){
    nav { flex-wrap: wrap; justify-content: center; padding:15px 20px; gap:15px; }
    header h1 { font-size:42px; }
    header p { font-size:18px; }
    .skill { font-size:18px; max-width:45%; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav>

<a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="resume.html">Resume</a>
    <a href="projects.html">My Projects</a>
    <a href="skills.html">Skills</a>
    <a href="certification.html">Certification</a>
    <a href="experience.html">experience</a>
    <a href="contact.html">contact</a>
</nav>

<!-- Content -->
<div class="content">
<header>
    <h1>Technical Skills</h1>
    <p>These are the programming languages and tools I work with.</p>
</header>

<div class="skills-list">
    <div class="skill">Python</div>
    <div class="skill">Java</div>
    <div class="skill">C</div>
    <div class="skill">SQL</div>
    <div class="skill">HTML</div>
    <div class="skill">CSS</div>
    <div class="skill">JavaScript</div>
    <div class="skill">MySQL</div>
   
</div>
</div>

<!-- Footer -->


</body>
</html>
