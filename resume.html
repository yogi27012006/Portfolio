<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yogeswari A | Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Reset & Font ===== */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
html { scroll-behavior: smooth; }

/* ===== Body & Gradient Background ===== */
body {
    background: linear-gradient(135deg, #0a0f1f, #111a2e, #1b2a49);
    color:#ffffff;
    min-height:100vh;
    overflow-x:hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
}
body::before {
    content:"";
    position: fixed;
    inset:0;
    background: radial-gradient(circle at 25% 30%, rgba(0,255,200,0.25), transparent 40%),
                radial-gradient(circle at 75% 70%, rgba(0,150,255,0.25), transparent 40%);
    z-index:-1;
    filter: blur(120px);
}

/* ===== Navbar ===== */
nav {
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    background: linear-gradient(90deg, #0f0f1a, #1c1c2b, #141421);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 20px 60px;
    gap: 25px;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 1000;
}
nav h2 {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    font-size: 18px;
    font-weight: 600;
}
nav a {
    text-decoration: none;
    color: #ffffff;
    font-weight: 500;
    transition: 0.3s;
    padding: 8px 14px;
    border-radius: 20px;
}
nav a:hover { background: linear-gradient(90deg,#ffffff,#e0e0ff); color:#000; transform: scale(1.08); }
nav a.active {
    background: linear-gradient(90deg,#00f5d4,#9b5de5);
    color: #000;
    padding: 8px 15px;
    border-radius: 20px;
    font-weight: 600;
    box-shadow: 0 0 15px rgba(0,245,212,0.7);
}

/* ===== Content Centering & Width ===== */
.content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 80px 40px 40px 40px; /* clear navbar space */
    gap: 40px;
    width: 90%;
    max-width: 1200px;
}

/* ===== Header ===== */
header h1 { font-size: 60px; color: #ffffff; margin-bottom: 25px; }
header p { color: #d1d1d1; font-size: 24px; line-height: 1.8; text-align: center; }

/* ===== Resume Button ===== */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #bb86fc;
    color: #0f0f1a;
    border-radius: 25px;
    text-decoration: none;
    font-weight: 600;
    font-size: 20px;
    transition: 0.3s;
}
.btn:hover {
    background: #9b5de5;
}

/* ===== Footer ===== */
footer { text-align: center; padding: 20px; color: #ffffffcc; margin-top: 40px; }

@media (max-width: 768px){
    nav { flex-wrap: wrap; justify-content: center; padding:15px 20px; gap:15px; }
    .content { padding-top: 160px; width: 95%; }
    header h1 { font-size: 42px; }
    header p { font-size: 18px; }
    .btn { font-size: 18px; padding: 10px 20px; }
}
</style>
</head>
<body>

<!-- ===== Navbar ===== -->
<nav>
   
   <a href="index.html" >Home</a>
    <a href="about.html">About</a>
    <a href="resume.html">Resume</a>
    <a href="projects.html">My Projects</a>
    <a href="skills.html">Skills</a>
    <a href="certification.html">Certification</a>
    <a href="experience.html">experience</a>
    <a href="contact.html">contact</a>
</nav>

<!-- ===== Content ===== -->
<div class="content">
    <header>
        <h1>Resume</h1>
        <p>You can download my complete resume by clicking the button below.</p>
        <a href="Screenshot 2026-03-19 201625.png" download class="btn">Download Resume</a>
    </header>
</div>

<!-- ===== Footer ===== -->
<footer>
<p>© 2026 Yogeswari A | Portfolio Website</p>
</footer>

<script>
// Highlight active menu link automatically
const navLinks = document.querySelectorAll("nav a");
navLinks.forEach(link => { if(link.href === window.location.href){ link.classList.add("active"); } });
</script>

</body>
</html>
